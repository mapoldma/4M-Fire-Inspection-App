<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="4M Fire">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#000000">
    <link rel="manifest" href="manifest.json">
    <title>4M Fire Inc. - Sprinkler System Inspection</title>
    <!-- PDF generation library for iPad/mobile compatibility -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --primary-color: #000;
            --accent-color: #000;
            --success-color: #000;
            --warning-color: #666;
            --danger-color: #000;
            --light-gray: #f5f5f5;
            --border-color: #ddd;
            --text-color: #333;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #fff;
            color: var(--text-color);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: linear-gradient(135deg, var(--primary-color) 0%, #1a1a1a 100%);
            color: white;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-img {
            height: 40px;
            width: auto;
            filter: invert(1);
        }

        .header-text h1 {
            font-size: 24px;
            font-weight: 700;
        }

        .header-text p {
            font-size: 12px;
            opacity: 0.9;
        }

        .header-contact {
            font-size: 12px;
            text-align: right;
            line-height: 1.4;
        }

        .progress-bar {
            background-color: var(--light-gray);
            height: 60px;
            display: flex;
            overflow-x: auto;
            padding: 8px 20px;
            gap: 8px;
            border-bottom: 1px solid var(--border-color);
        }

        .progress-step {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 90px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            opacity: 0.5;
            transition: opacity 0.3s, color 0.3s;
        }

        .progress-step.active {
            opacity: 1;
            color: var(--accent-color);
        }

        .progress-step.completed {
            opacity: 0.7;
            color: var(--success-color);
        }
        .progress-step.disabled {
            opacity: 0.3;
            cursor: default;
            pointer-events: none;
        }


        .step-circle {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background-color: white;
            border: 2px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            margin-bottom: 4px;
            transition: all 0.3s;
        }

        .progress-step.active .step-circle {
            background-color: var(--accent-color);
            border-color: var(--accent-color);
            color: white;
        }

        .progress-step.completed .step-circle {
            background-color: var(--success-color);
            border-color: var(--success-color);
            color: white;
        }

        .container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .screen {
            display: none;
            animation: fadeIn 0.3s;
        }

        .screen.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .screen-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 24px;
            color: var(--primary-color);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
            color: var(--text-color);
        }

        input[type="text"],
        input[type="date"],
        input[type="number"],
        textarea,
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--border-color);
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="date"]:focus,
        input[type="number"]:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(211, 47, 47, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .radio-group {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }

        .radio-option {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 6px;
            transition: background-color 0.3s;
        }

        .radio-option input[type="radio"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #000;
        }

        .radio-option:hover {
            background-color: var(--light-gray);
        }

        .toggle-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .toggle-btn {
            padding: 12px 20px;
            border: 2px solid var(--border-color);
            background-color: white;
            color: var(--text-color);
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
            min-width: 60px;
            text-align: center;
        }

        .toggle-btn:active,
        .toggle-btn.selected {
            border-color: var(--accent-color);
        }

        .toggle-btn.selected.yes {
            background-color: #000;
            color: white;
            border-color: #000;
        }

        .toggle-btn.selected.no {
            background-color: #000;
            color: white;
            border-color: #000;
            font-weight: bold;
        }

        .toggle-btn.selected.no::after {
            content: " ✕";
        }

        .toggle-btn.selected.na {
            background-color: #999;
            color: white;
            border-color: #999;
        }

        .counter-group {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .counter-btn {
            width: 48px;
            height: 48px;
            border: 2px solid var(--border-color);
            background-color: white;
            border-radius: 6px;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            color: #000;
        }

        .counter-btn:active {
            transform: scale(0.95);
        }

        .counter-display {
            width: 60px;
            padding: 12px;
            text-align: center;
            border: 2px solid var(--border-color);
            border-radius: 6px;
            font-weight: 700;
            font-size: 18px;
            background-color: var(--light-gray);
        }

        .collapsible-section {
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            overflow: hidden;
        }

        .collapsible-header {
            background-color: var(--light-gray);
            padding: 16px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
            user-select: none;
            transition: background-color 0.3s;
        }

        .collapsible-header:hover {
            background-color: #e8e8e8;
        }

        .collapsible-header .toggle-icon {
            width: 24px;
            height: 24px;
            transition: transform 0.3s;
        }

        .collapsible-content {
            display: none;
            padding: 16px;
            border-top: 1px solid var(--border-color);
        }

        .collapsible-section.expanded .collapsible-content {
            display: block;
        }

        .collapsible-section.expanded .toggle-icon {
            transform: rotate(180deg);
        }

        .checklist-item {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border-color);
        }

        .checklist-item:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .checklist-label {
            flex: 1;
            padding-top: 6px;
        }

        .checklist-label label {
            margin-bottom: 0;
            font-weight: 500;
            cursor: pointer;
        }

        .checklist-controls {
            display: flex;
            gap: 10px;
            align-items: flex-start;
        }

        .notes-icon {
            width: 36px;
            height: 36px;
            border: 2px solid var(--border-color);
            background-color: white;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all 0.3s;
            flex-shrink: 0;
        }

        .notes-icon:hover {
            border-color: var(--accent-color);
            color: var(--accent-color);
        }

        .notes-field {
            display: none;
            margin-top: 12px;
            animation: slideDown 0.3s;
        }

        .notes-field.show {
            display: block;
        }

        @keyframes slideDown {
            from { opacity: 0; max-height: 0; }
            to { opacity: 1; max-height: 500px; }
        }

        .notes-field textarea {
            width: 100%;
            min-height: 80px;
            font-size: 13px;
        }

        .footer {
            display: flex;
            gap: 12px;
            padding: 16px 20px;
            border-top: 1px solid var(--border-color);
            background-color: var(--light-gray);
        }

        .btn {
            padding: 14px 24px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            min-height: 50px;
        }

        .btn-primary {
            background-color: var(--accent-color);
            color: white;
            flex: 1;
        }

        .btn-primary:hover {
            background-color: #b71c1c;
            box-shadow: 0 4px 12px rgba(211, 47, 47, 0.3);
        }

        .btn-secondary {
            background-color: #999;
            color: white;
            flex: 1;
        }

        .btn-secondary:hover {
            background-color: #777;
        }

        .btn-secondary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-success {
            background-color: var(--success-color);
            color: white;
            flex: 1;
        }

        .btn-success:hover {
            background-color: #388e3c;
        }

        .summary-section {
            background-color: var(--light-gray);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 16px;
            margin-bottom: 20px;
        }

        .summary-section h3 {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 12px;
            color: var(--primary-color);
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid var(--border-color);
            font-size: 14px;
        }

        .summary-row:last-child {
            border-bottom: none;
        }

        .summary-row .label {
            font-weight: 600;
            color: var(--text-color);
        }

        .summary-row .value {
            color: #666;
        }

        .asset-card {
            background-color: var(--light-gray);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .asset-card h4 {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 12px;
            color: var(--accent-color);
        }

        .table-container {
            overflow-x: auto;
            margin: 16px 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        th {
            background-color: var(--primary-color);
            color: white;
            padding: 10px;
            text-align: left;
            font-weight: 600;
        }

        td {
            border: 1px solid var(--border-color);
            padding: 10px;
        }

        tr:nth-child(even) {
            background-color: var(--light-gray);
        }

        .add-row-btn {
            background-color: var(--success-color);
            color: white;
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            margin-top: 12px;
            transition: background-color 0.3s;
        }

        .add-row-btn:hover {
            background-color: #388e3c;
        }

        .remove-row-btn {
            background-color: var(--danger-color);
            color: white;
            padding: 6px 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
            transition: background-color 0.3s;
        }

        .remove-row-btn:hover {
            background-color: #000;
        }

        @media (max-width: 768px) {
            .header-text h1 {
                font-size: 18px;
            }

            .header-contact {
                display: none;
            }

            .progress-bar {
                padding: 6px 10px;
            }

            .progress-step {
                min-width: 70px;
                font-size: 9px;
            }

            .screen-title {
                font-size: 22px;
            }

            .btn {
                font-size: 14px;
                padding: 12px 16px;
            }
        }

        .toggle-icon {
            display: inline-block;
            width: 0;
            height: 0;
            border-left: 6px solid transparent;
            border-right: 6px solid transparent;
            border-top: 8px solid var(--text-color);
            transition: transform 0.3s;
        }

        .asset-section {
            background-color: var(--light-gray);
            padding: 16px;
            border-radius: 6px;
            margin-bottom: 16px;
        }

        .asset-section h3 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 16px;
            color: var(--primary-color);
        }

        .standpipe-toggle {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .standpipe-toggle .toggle-btn {
            flex: 0 1 80px;
        }

        .inline-section {
            background-color: white;
            border-left: 4px solid var(--accent-color);
            padding: 12px;
            margin: 12px 0;
            border-radius: 4px;
        }

        .field-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        @media (max-width: 768px) {
            .field-grid {
                grid-template-columns: 1fr;
            }
        }

        .flow-table-input {
            padding: 8px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 13px;
        }

        /* Dashboard Styles */
        .dashboard-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #fff;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .dashboard-header {
            background: linear-gradient(135deg, #000 0%, #1a1a1a 100%);
            color: white;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .dashboard-header h2 {
            font-size: 22px;
            font-weight: 700;
        }

        .dashboard-controls {
            padding: 16px 20px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            background: var(--light-gray);
        }

        .dashboard-controls input,
        .dashboard-controls select {
            padding: 10px 14px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 14px;
            background: #fff;
        }

        .dashboard-controls input[type="text"] {
            flex: 1;
            min-width: 200px;
        }

        .dashboard-controls select {
            min-width: 150px;
        }

        .dashboard-list {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
        }

        .dashboard-card {
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: box-shadow 0.2s;
            background: #fff;
        }

        .dashboard-card:hover {
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .dashboard-card-info {
            flex: 1;
        }

        .dashboard-card-info h4 {
            font-size: 16px;
            margin-bottom: 4px;
        }

        .dashboard-card-info p {
            font-size: 13px;
            color: #666;
            margin-bottom: 2px;
        }

        .dashboard-card-actions {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }

        .dashboard-card-actions button {
            padding: 8px 14px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            background: #fff;
            font-weight: 600;
            transition: background 0.2s;
        }

        .dashboard-card-actions button:hover {
            background: var(--light-gray);
        }

        .dashboard-card-actions button.load-btn {
            background: #000;
            color: #fff;
            border-color: #000;
        }

        .dashboard-card-actions button.load-btn:hover {
            background: #333;
        }

        .dashboard-card-actions button.clone-btn {
            background: #0078d4;
            color: #fff;
            border-color: #0078d4;
        }

        .dashboard-card-actions button.clone-btn:hover {
            background: #005a9e;
        }

        .dashboard-card-actions button.delete-btn {
            color: #c00;
            border-color: #c00;
        }

        .dashboard-card-actions button.delete-btn:hover {
            background: #fff0f0;
        }

        .dashboard-empty {
            text-align: center;
            padding: 60px 20px;
            color: #999;
            font-size: 16px;
        }

        .dashboard-stats {
            display: flex;
            gap: 16px;
            padding: 12px 20px;
            border-bottom: 1px solid var(--border-color);
            background: #fff;
        }

        .dashboard-stat {
            font-size: 13px;
            color: #666;
        }

        .dashboard-stat strong {
            color: #000;
            font-size: 18px;
            display: block;
        }

        .header-db-btn {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.3);
            color: #fff;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: background 0.2s;
        }

        .header-db-btn:hover {
            background: rgba(255,255,255,0.25);
        }

        .export-btn {
            background: #000;
            color: #fff;
            border: none;
            padding: 10px 18px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: background 0.2s;
        }

        .export-btn:hover {
            background: #333;
        }

        @media (max-width: 768px) {
            .dashboard-card {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }
            .dashboard-card-actions {
                width: 100%;
            }
            .dashboard-card-actions button {
                flex: 1;
            }
            .dashboard-controls {
                flex-direction: column;
            }
            .dashboard-controls input[type="text"] {
                min-width: 100%;
            }
            .dashboard-stats {
                flex-wrap: wrap;
            }
        }

        /* iPad & tablet optimizations */
        @media (min-width: 768px) and (max-width: 1200px) {
            .container {
                padding: 20px 40px;
            }
            .field-grid {
                grid-template-columns: 1fr 1fr;
                gap: 20px;
            }
        }

        /* Touch-friendly sizing for all mobile/tablet */
        @media (hover: none) and (pointer: coarse) {
            input, select, textarea {
                font-size: 16px !important; /* prevents iOS zoom on focus */
                min-height: 48px;
            }
            .toggle-btn, .btn, button {
                min-height: 48px;
                min-width: 48px;
            }
            .counter-btn {
                min-width: 52px;
                min-height: 52px;
                font-size: 24px;
            }
            .checklist-item {
                padding: 14px 12px;
            }
            .toggle-group .toggle-btn {
                padding: 12px 16px;
                font-size: 15px;
            }
            .progress-step {
                min-width: 80px;
                padding: 6px 4px;
            }
            .dashboard-card-actions button {
                padding: 14px 16px;
                font-size: 15px;
            }
            .collapsible-header {
                padding: 16px;
            }
        }
    </style>
</head>
<body>

    <script>
        // IndexedDB Database
        const DB_NAME = '4MFireInspections';
        const DB_VERSION = 1;
        const STORE_NAME = 'inspections';

        function openDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        const store = db.createObjectStore(STORE_NAME, { keyPath: 'id', autoIncrement: true });
                        store.createIndex('date', 'inspectionDate');
                        store.createIndex('company', 'companyName');
                        store.createIndex('inspector', 'inspectorName');
                        store.createIndex('address', 'buildingAddress');
                    }
                };
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        }

        async function saveInspectionToDB(data) {
            const db = await openDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(STORE_NAME, 'readwrite');
                const store = tx.objectStore(STORE_NAME);
                const record = {
                    inspectionDate: data.screen1.inspectionDate,
                    inspectorName: data.screen1.inspectorName,
                    skillCert: data.screen1.skillCert,
                    inspectionType: data.screen1.inspectionType,
                    executiveSummary: data.screen1.executiveSummary || '',
                    companyName: data.screen2.companyName,
                    buildingAddress: data.screen2.buildingAddress,
                    contactInfo: data.screen2.contactInfo,
                    lockBoxCode: data.screen2.lockBoxCode || '',
                    firePanelCompany: data.screen2.firePanelCompany || '',
                    firePanelAccount: data.screen2.firePanelAccount || '',
                    firePanelPassword: data.screen2.firePanelPassword || '',
                    drySystems: data.screen3.drySystems,
                    wetSystems: data.screen3.wetSystems,
                    firePumps: data.screen3.firePumps,
                    fireHydrants: data.screen3.fireHydrants,
                    standpipe: data.screen3.standpipe,
                    deficiencies: data.screen6.deficiencies || '',
                    recommendations: data.screen6.recommendations || '',
                    savedAt: new Date().toISOString(),
                    fullData: JSON.parse(JSON.stringify(data))
                };
                const req = store.add(record);
                req.onsuccess = () => resolve(req.result);
                req.onerror = () => reject(req.error);
                tx.oncomplete = () => db.close();
            });
        }

        async function getAllInspections() {
            const db = await openDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(STORE_NAME, 'readonly');
                const store = tx.objectStore(STORE_NAME);
                const req = store.getAll();
                req.onsuccess = () => resolve(req.result);
                req.onerror = () => reject(req.error);
                tx.oncomplete = () => db.close();
            });
        }

        async function getInspectionById(id) {
            const db = await openDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(STORE_NAME, 'readonly');
                const store = tx.objectStore(STORE_NAME);
                const req = store.get(id);
                req.onsuccess = () => resolve(req.result);
                req.onerror = () => reject(req.error);
                tx.oncomplete = () => db.close();
            });
        }

        async function deleteInspectionFromDB(id) {
            const db = await openDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(STORE_NAME, 'readwrite');
                const store = tx.objectStore(STORE_NAME);
                const req = store.delete(id);
                req.onsuccess = () => resolve();
                req.onerror = () => reject(req.error);
                tx.oncomplete = () => db.close();
            });
        }

        let currentScreen = 0;

        function initializeProgressBar() {
            const progressBar = document.getElementById('progressBar');
            progressBar.innerHTML = screens.map((screen, idx) => `
                <div class="progress-step ${idx === 0 ? 'active' : ''}" onclick="goToScreen(${idx})">
                    <div class="step-circle">${idx + 1}</div>
                    <div>${screen.title}</div>
                </div>
            `).join('');
        }

        function updateProgressBar() {
            document.querySelectorAll('.progress-step').forEach((step, idx) => {
                step.classList.remove('active', 'completed', 'disabled');
                if (idx === currentScreen) {
                    step.classList.add('active');
                } else if (idx < currentScreen) {
                    step.classList.add('completed');
                } else {
                    // Everything ahead of current screen is disabled — must use Next button
                    step.classList.add('disabled');
                }
            });
        }

        let highestScreenReached = 0;

        function goToScreen(screenIndex) {
            // Only allow going BACK to previously completed screens, never forward
            if (screenIndex < currentScreen) {
                currentScreen = screenIndex;
                renderScreen();
                updateProgressBar();
                document.getElementById('container').scrollTop = 0;
            }
            // To go forward, user must use the Next button (enforces sequential validation)
        }

        function nextScreen() {
            if (validateScreen(currentScreen)) {
                if (currentScreen < screens.length - 1) {
                    currentScreen++;
                    if (currentScreen > highestScreenReached) {
                        highestScreenReached = currentScreen;
                    }
                    renderScreen();
                    updateProgressBar();
                    document.getElementById('container').scrollTop = 0;
                }
            }
        }

        function previousScreen() {
            if (currentScreen > 0) {
                currentScreen--;
                renderScreen();
                updateProgressBar();
                document.getElementById('container').scrollTop = 0;
            }
        }

        function validateScreen(screenIndex) {
            switch(screenIndex) {
                case 0:
                    if (!inspectionData.screen1.inspectionDate) {
                        alert('Please enter Inspection Date');
                        return false;
                    }
                    if (!inspectionData.screen1.inspectorName.trim()) {
                        alert('Please enter Inspector Name');
                        return false;
                    }
                    if (!inspectionData.screen1.skillCert.trim()) {
                        alert('Please enter Skilled Trade Certification #');
                        return false;
                    }
                    if (!inspectionData.screen1.inspectionType) {
                        alert('Please select Inspection Type');
                        return false;
                    }
                    return true;
                case 1:
                    if (!inspectionData.screen2.buildingAddress.trim()) {
                        alert('Please enter Building Address');
                        return false;
                    }
                    if (!inspectionData.screen2.companyName.trim()) {
                        alert('Please enter Company Name');
                        return false;
                    }
                    return true;
                default:
                    return true;
            }
        }

        function createToggleButtons(itemKey, currentValue) {
            const options = ['Yes', 'No', 'N/A'];
            return options.map(opt => {
                const valueMap = { 'Yes': 'yes', 'No': 'no', 'N/A': 'na' };
                const val = valueMap[opt];
                const isSelected = currentValue === val;
                return `
                    <button class="toggle-btn ${isSelected ? 'selected ' + val : ''}"
                            onclick="updateToggle(this, '${itemKey}', '${val}')">${opt}</button>
                `;
            }).join('');
        }

        function updateToggle(btn, itemKey, value) {
            btn.parentElement.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('selected', 'yes', 'no', 'na'));
            btn.classList.add('selected', value);

            const keys = itemKey.split('.');
            // Determine which screen the data belongs to
            const assetPrefixes = ['drySystem_', 'wetSystem_', 'firePump_', 'fireHydrant_'];
            const isAssetToggle = assetPrefixes.some(prefix => itemKey.startsWith(prefix));

            if (isAssetToggle) {
                // Asset toggles: e.g. "drySystem_0.alarmSwitch" → screen5.drySystems[0].alarmSwitch
                const parts = keys[0].split('_');
                const type = parts[0]; // drySystem, wetSystem, firePump, fireHydrant
                const idx = parseInt(parts[1]);
                const field = keys[1];
                const typeMap = { drySystem: 'drySystems', wetSystem: 'wetSystems', firePump: 'firePumps', fireHydrant: 'fireHydrants' };
                const arrayKey = typeMap[type];
                if (arrayKey && inspectionData.screen5[arrayKey][idx]) {
                    inspectionData.screen5[arrayKey][idx][field] = value;
                }
            } else {
                // General checklist toggles: e.g. "ownerSection.item1"
                let obj = inspectionData.screen4;
                for (let i = 0; i < keys.length - 1; i++) {
                    if (!obj[keys[i]]) obj[keys[i]] = {};
                    obj = obj[keys[i]];
                }
                obj[keys[keys.length - 1]] = value;
            }
        }

        // Build a standardized filename: ClientName_InspectionDate_Frequency
        function buildInspectionFilename(data, extension) {
            const freqMap = {
                'annual': 'Annual',
                'semiannual': 'Semi-Annual',
                'monthly': 'Monthly'
            };
            const client = (data.screen2.companyName || 'UnknownClient').replace(/[^a-zA-Z0-9]/g, '_').replace(/_+/g, '_');
            const date = data.screen1.inspectionDate || new Date().toISOString().split('T')[0];
            const freq = freqMap[data.screen1.inspectionType] || data.screen1.inspectionType || 'Inspection';
            return client + '_' + date + '_' + freq + '.' + extension;
        }

        // Build filename from a saved DB record (which has flat fields, not nested screens)
        function buildFilenameFromRecord(record, extension) {
            const freqMap = {
                'annual': 'Annual',
                'semiannual': 'Semi-Annual',
                'monthly': 'Monthly'
            };
            const client = (record.companyName || 'UnknownClient').replace(/[^a-zA-Z0-9]/g, '_').replace(/_+/g, '_');
            const date = record.inspectionDate || new Date().toISOString().split('T')[0];
            const freq = freqMap[record.inspectionType] || record.inspectionType || 'Inspection';
            return client + '_' + date + '_' + freq + '.' + extension;
        }

        function saveReport() {
            const dataStr = JSON.stringify(inspectionData, null, 2);
            const blob = new Blob([dataStr], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = buildInspectionFilename(inspectionData, 'json');
            a.click();
            URL.revokeObjectURL(url);
        }

        function loadReport() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    try {
                        const data = JSON.parse(ev.target.result);
                        Object.assign(inspectionData, data);
                        const s4keys = ['ownerSection','fireDepartmentConnection','sprinklerHeads','pipes','controlValveArea','valveArea','backflowPreventers','alarms','maintenance','inspection'];
                        s4keys.forEach(k => { if (!inspectionData.screen4[k]) inspectionData.screen4[k] = {}; });
                        if (!inspectionData.screen5) inspectionData.screen5 = { drySystems:[], wetSystems:[], firePumps:[], fireHydrants:[], flowsTamperSwitch:[] };
                        if (!inspectionData.screen6) inspectionData.screen6 = { deficiencies:'', recommendations:'' };
                        currentScreen = 0;
                        highestScreenReached = 0;
                        renderScreen();
                        updateProgressBar();
                        alert('Report loaded successfully!');
                    } catch(err) {
                        alert('Error loading file: ' + err.message);
                    }
                };
                reader.readAsText(file);
            };
            input.click();
        }

        async function renderDashboard() {
            let inspections = [];

                console.error('Failed to load inspections:', e);
            }

            // Filter
            let filtered = inspections;
            if (dashboardSearchTerm) {
                const term = dashboardSearchTerm.toLowerCase();
                filtered = filtered.filter(r =>
                    (r.companyName || '').toLowerCase().includes(term) ||
                    (r.buildingAddress || '').toLowerCase().includes(term) ||
                    (r.inspectorName || '').toLowerCase().includes(term) ||
                    (r.deficiencies || '').toLowerCase().includes(term)
                );
            }
            if (dashboardFilter) {
                filtered = filtered.filter(r => r.inspectionType === dashboardFilter);
            }

            // Sort
            filtered.sort((a, b) => {
                switch(dashboardSort) {
                    case 'date-desc': return (b.inspectionDate || '').localeCompare(a.inspectionDate || '');
                    case 'date-asc': return (a.inspectionDate || '').localeCompare(b.inspectionDate || '');
                    case 'company-asc': return (a.companyName || '').localeCompare(b.companyName || '');
                    case 'company-desc': return (b.companyName || '').localeCompare(a.companyName || '');
                    case 'inspector-asc': return (a.inspectorName || '').localeCompare(b.inspectorName || '');
                    default: return 0;
                }
            });

            let overlay = document.getElementById('dashboardOverlay');
            if (!overlay) {
                overlay = document.createElement('div');
                overlay.id = 'dashboardOverlay';
                overlay.className = 'dashboard-overlay';
                document.body.appendChild(overlay);
            }

            const totalInspections = inspections.length;
            const uniqueBuildings = new Set(inspections.map(r => r.buildingAddress)).size;
            const thisMonth = inspections.filter(r => {
                if (!r.inspectionDate) return false;
                const d = new Date(r.inspectionDate);

                return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
            }).length;

            let html = `
                <div class="dashboard-header">
                    <h2>📁 Saved Inspections</h2>
                    <button class="header-db-btn" onclick="closeDashboard()">✕ Close</button>
                </div>

                        <option value="">All Types</option>
                        <option value="annual" ${dashboardFilter === 'annual' ? 'selected' : ''}>Annual</option>
                        <option value="semiannual" ${dashboardFilter === 'semiannual' ? 'selected' : ''}>Semi-Annual</option>
                        <option value="monthly" ${dashboardFilter === 'monthly' ? 'selected' : ''}>Monthly</option>
                    </select>
                    <select onchange="dashboardSort = this.value; renderDashboard()">
                        <option value="date-desc" ${dashboardSort === 'date-desc' ? 'selected' : ''}>Newest First</option>
                        <option value="date-asc" ${dashboardSort === 'date-asc' ? 'selected' : ''}>Oldest First</option>
                        <option value="company-asc" ${dashboardSort === 'company-asc' ? 'selected' : ''}>Company A-Z</option>
                        <option value="company-desc" ${dashboardSort === 'company-desc' ? 'selected' : ''}>Company Z-A</option>
                        <option value="inspector-asc" ${dashboardSort === 'inspector-asc' ? 'selected' : ''}>Inspector A-Z</option>

                </div>
                <div class="dashboard-list">`;

                html += `<div class="dashboard-empty">${inspections.length === 0 ? 'No inspections saved yet. Complete an inspection and generate a PDF to save it here.' : 'No inspections match your search.'}</div>`;

        async function loadFromDB(id) {
            try {
                const record = await getInspectionById(id);
                if (record && record.fullData) {
                    Object.assign(inspectionData, record.fullData);
                    const s4keys = ['ownerSection','fireDepartmentConnection','sprinklerHeads','pipes','controlValveArea','valveArea','backflowPreventers','alarms','maintenance','inspection'];
                    s4keys.forEach(k => { if (!inspectionData.screen4[k]) inspectionData.screen4[k] = {}; });

                    if (!inspectionData.screen6) inspectionData.screen6 = { deficiencies:'', recommendations:'' };
                    currentScreen = 0;
                    highestScreenReached = 0;
                    renderScreen();
                    updateProgressBar();
                    closeDashboard();
                    alert('Inspection loaded successfully!');
                }
            } catch(e) {
                alert('Error loading inspection: ' + e.message);
            }
        }

        async function viewFromDB(id) {
            try {
                const record = await getInspectionById(id);
                if (record && record.fullData) {
                    // Temporarily swap data, generate PDF, swap back
                    const backup = JSON.parse(JSON.stringify(inspectionData));
                    Object.assign(inspectionData, record.fullData);
                    generatePDF();
                    Object.assign(inspectionData, backup);
                }
            } catch(e) {
                alert('Error viewing inspection: ' + e.message);
            }

        // Clone an inspection for reuse — copies everything except date, inspector, and cert
        async function cloneForNewInspection(id) {
            try {
                const record = await getInspectionById(id);
                if (!record || !record.fullData) {
                    alert('Could not load inspection data.');
                    return;
                }
                const cloned = JSON.parse(JSON.stringify(record.fullData));

                // Clear per-inspection fields — keep everything else
                cloned.screen1.inspectionDate = '';
                cloned.screen1.inspectorName = '';
                cloned.screen1.skillCert = '';
                cloned.screen1.executiveSummary = '';

                // Clear deficiencies/recommendations since they're inspection-specific
                if (cloned.screen6) {
                    cloned.screen6.deficiencies = '';
                    cloned.screen6.recommendations = '';
                }

                Object.assign(inspectionData, cloned);

                // Ensure all sub-objects exist
                const s4keys = ['ownerSection','fireDepartmentConnection','sprinklerHeads','pipes','controlValveArea','valveArea','backflowPreventers','alarms','maintenance','inspection'];
                s4keys.forEach(k => { if (!inspectionData.screen4[k]) inspectionData.screen4[k] = {}; });
                if (!inspectionData.screen5) inspectionData.screen5 = { drySystems:[], wetSystems:[], firePumps:[], fireHydrants:[], flowsTamperSwitch:[] };
                if (!inspectionData.screen6) inspectionData.screen6 = { deficiencies:'', recommendations:'' };

                currentScreen = 0;
                highestScreenReached = 6;
                renderScreen();
                updateProgressBar();
                closeDashboard();
                alert('Previous inspection loaded as template!\n\nBuilding info, asset config, and checklist answers have been carried over.\n\nPlease fill in the date, inspector name, and certification # to begin.');
            } catch(e) {
                alert('Error cloning inspection: ' + e.message);
            }
        }

        // Save a single inspection as JSON to a user-chosen folder (OneDrive, SharePoint, etc.)
        async function saveOneToOneDrive(id) {
            try {
                const record = await getInspectionById(id);
                if (!record || !record.fullData) {
                    alert('Could not load inspection data.');
                    return;
                }

                const filename = buildFilenameFromRecord(record, 'json');

                const exportData = {
                    appVersion: '4M Fire Inspection',
                    exportedAt: new Date().toISOString(),
                    inspectionCount: 1,
                    inspections: [record]
                };
                const json = JSON.stringify(exportData, null, 2);

                // Try the File System Access API (lets user pick their OneDrive folder)
                if (window.showSaveFilePicker) {
                    try {
                        const handle = await window.showSaveFilePicker({
                            suggestedName: filename,
                            types: [{
                                description: '4M Inspection File',
                                accept: { 'application/json': ['.json'] }
                            }]
                        });
                        const writable = await handle.createWritable();
                        await writable.write(json);
                        await writable.close();
                        alert('Inspection saved successfully!\n\nTip: Save to your OneDrive or SharePoint folder so your team can access it.');
                        return;
                    } catch (pickerErr) {
                        if (pickerErr.name === 'AbortError') return; // User cancelled
                        // Fall through to regular download
                    }
                }

                // Fallback: regular download
                const blob = new Blob([json], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                a.click();
                URL.revokeObjectURL(url);
                alert('File downloaded!\n\nMove it to your OneDrive or SharePoint folder to share with your team.');
            } catch(e) {
                alert('Error saving inspection: ' + e.message);
            }
        }

        // Download PDF file — uses html2pdf.js to convert the already-rendered
        // #reportContent HTML into a nicely formatted PDF. This is far more
        // reliable across iPad, desktop, and all browsers than manual jsPDF.
        function downloadPDFFile() {
            const btn = document.getElementById('downloadPdfBtn');
            const originalText = btn ? btn.textContent : '';
            if (btn) { btn.textContent = '⏳ Generating PDF...'; btn.disabled = true; }

            const restore = () => { if (btn) { btn.textContent = originalText; btn.disabled = false; } };

            try {
                if (typeof html2pdf === 'undefined') {
                    throw new Error('PDF library not loaded. Please refresh and try again.');
                }

                const reportEl = document.getElementById('reportContent');
                if (!reportEl) {
                    throw new Error('Report not rendered yet. Please reopen the report and try again.');
                }

                const filename = buildInspectionFilename(inspectionData, 'pdf');

                // IMPORTANT: html2canvas can't capture elements positioned offscreen
                // (e.g. left:-10000px) — it produces a blank PDF. We must render
                // from the visible #reportContent element directly.
                const opt = {
                    margin:       [0.4, 0.4, 0.5, 0.4],
                    filename:     filename,
                    image:        { type: 'jpeg', quality: 0.95 },
                    html2canvas:  { scale: 2, useCORS: true, letterRendering: true, backgroundColor: '#ffffff', scrollX: 0, scrollY: 0 },
                    jsPDF:        { unit: 'in', format: 'letter', orientation: 'portrait' },
                    pagebreak:    { mode: ['css', 'legacy'], avoid: ['tr', 'thead'] }
                };

                // Scroll the overlay to top so html2canvas captures from the start
                const overlay = document.getElementById('reportOverlay');
                if (overlay) overlay.scrollTop = 0;

                html2pdf().set(opt).from(reportEl).save()
                    .then(() => { restore(); })
                    .catch(err => {
                        console.error('html2pdf error:', err);
                        restore();
                        alert('PDF generation failed: ' + (err && err.message ? err.message : err) + '\n\nYou can use the Print button as an alternative — choose "Save as PDF" from the print dialog.');
                    });
            } catch (err) {
                console.error('PDF generation error:', err);
                restore();
                alert('PDF generation failed: ' + err.message + '\n\nYou can use the Print button as an alternative — choose "Save as PDF" from the print dialog.');
            }
        }

        // --- Legacy jsPDF implementation kept for reference but no longer used ---
        function _unusedDownloadPDF_jsPDF() {
            const btn = document.getElementById('downloadPdfBtn');
            const originalText = btn ? btn.textContent : '';
            if (btn) { btn.textContent = '⏳ Generating PDF...'; btn.disabled = true; }

            try {
                // jsPDF is bundled with html2pdf.js as window.jspdf.jsPDF
                const jsPDFCtor = (window.jspdf && window.jspdf.jsPDF) || window.jsPDF;
                if (!jsPDFCtor) {
                    throw new Error('PDF library not loaded. Please refresh and try again.');
                }

                const doc = new jsPDFCtor({ unit: 'pt', format: 'letter', orientation: 'portrait' });
                const d = inspectionData;
                const s = (v) => (v == null) ? '' : String(v);

                const pageW = doc.internal.pageSize.getWidth();   // 612 pt
                const pageH = doc.internal.pageSize.getHeight();  // 792 pt
                const marginX = 40;
                const marginTop = 50;
                const marginBottom = 50;
                let y = marginTop;

                const freqMap = { annual:'Annual Inspection', semiannual:'Semi-Annual Inspection', monthly:'Monthly Inspection' };
                const freqLabel = freqMap[d.screen1.inspectionType] || 'Inspection';

                // --- Helpers ---
                function ensureSpace(h) {
                    if (y + h > pageH - marginBottom) {
                        addFooter();
                        doc.addPage();
                        y = marginTop;
                    }
                }
                function addFooter() {
                    const n = doc.internal.getNumberOfPages();
                    doc.setFont('helvetica', 'normal');
                    doc.setFontSize(8);
                    doc.setTextColor(120);
                    doc.text('4M Fire Inc. — ' + (d.screen2.companyName || '') + ' — ' + (d.screen1.inspectionDate || ''), marginX, pageH - 25);
                    doc.text('Page ' + n, pageW - marginX, pageH - 25, { align: 'right' });
                    doc.setTextColor(0);
                }
                function sectionTitle(text) {
                    ensureSpace(30);
                    doc.setFillColor(0, 0, 0);
                    doc.rect(marginX, y, pageW - 2 * marginX, 22, 'F');
                    doc.setTextColor(255);
                    doc.setFont('helvetica', 'bold');
                    doc.setFontSize(12);
                    doc.text(text, marginX + 8, y + 15);
                    doc.setTextColor(0);
                    y += 30;
                }
                function subTitle(text) {
                    ensureSpace(20);
                    doc.setFont('helvetica', 'bold');
                    doc.setFontSize(11);
                    doc.text(text, marginX, y);
                    y += 16;
                }
                function labelValueRow(label, value) {
                    const lbl = s(label);
                    const val = s(value) || '—';
                    const labelW = 180;
                    const valueW = pageW - 2 * marginX - labelW - 10;
                    doc.setFont('helvetica', 'bold');
                    doc.setFontSize(10);
                    const lblLines = doc.splitTextToSize(lbl, labelW);
                    doc.setFont('helvetica', 'normal');
                    const valLines = doc.splitTextToSize(val, valueW);
                    const rowH = Math.max(lblLines.length, valLines.length) * 12 + 4;
                    ensureSpace(rowH);
                    doc.setFont('helvetica', 'bold');
                    doc.text(lblLines, marginX, y + 10);
                    doc.setFont('helvetica', 'normal');
                    doc.text(valLines, marginX + labelW, y + 10);
                    doc.setDrawColor(230);
                    doc.line(marginX, y + rowH - 1, pageW - marginX, y + rowH - 1);
                    y += rowH;
                }
                function para(text, size) {
                    size = size || 10;
                    doc.setFont('helvetica', 'normal');
                    doc.setFontSize(size);
                    const lines = doc.splitTextToSize(s(text) || '—', pageW - 2 * marginX);
                    for (let i = 0; i < lines.length; i++) {
                        ensureSpace(size + 2);
                        doc.text(lines[i], marginX, y + size);
                        y += size + 2;
                    }
                    y += 6;
                }
                function statusText(val) {
                    if (val === 'yes') return 'YES';
                    if (val === 'no') return 'NO';
                    if (val === 'na') return 'N/A';
                    return '—';
                }
                function checklistTable(section) {
                    const obj = d.screen4[section.key] || {};
                    // Header row
                    ensureSpace(20);
                    doc.setFillColor(50, 50, 50);
                    doc.rect(marginX, y, pageW - 2 * marginX, 18, 'F');
                    doc.setTextColor(255);
                    doc.setFont('helvetica', 'bold');
                    doc.setFontSize(9);
                    doc.text('Item', marginX + 6, y + 12);
                    doc.text('Status', marginX + 310, y + 12);
                    doc.text('Notes', marginX + 360, y + 12);
                    doc.setTextColor(0);
                    y += 20;

                    doc.setFont('helvetica', 'normal');
                    doc.setFontSize(9);
                    section.items.forEach((item, idx) => {
                        const val = obj[item.key] || '';
                        const notes = obj[item.key + '_notes'] || '';
                        const itemLines = doc.splitTextToSize(item.label, 295);
                        const notesLines = doc.splitTextToSize(notes || '—', pageW - marginX - 360 - 10);
                        const rowH = Math.max(itemLines.length, notesLines.length) * 11 + 6;
                        ensureSpace(rowH);
                        if (idx % 2 === 0) {
                            doc.setFillColor(248, 248, 248);
                            doc.rect(marginX, y, pageW - 2 * marginX, rowH, 'F');
                        }
                        doc.setTextColor(0);
                        doc.text(itemLines, marginX + 6, y + 10);
                        // Status badge
                        const st = statusText(val);
                        if (st !== '—') {
                            doc.setFillColor(st === 'N/A' ? 150 : 0, st === 'N/A' ? 150 : 0, st === 'N/A' ? 150 : 0);
                            doc.rect(marginX + 305, y + 3, 40, 14, 'F');
                            doc.setTextColor(255);
                            doc.setFont('helvetica', 'bold');
                            doc.setFontSize(8);
                            doc.text(st, marginX + 325, y + 13, { align: 'center' });
                            doc.setFont('helvetica', 'normal');
                            doc.setFontSize(9);
                            doc.setTextColor(0);
                        } else {
                            doc.setTextColor(150);
                            doc.text('—', marginX + 325, y + 11, { align: 'center' });
                            doc.setTextColor(0);
                        }
                        doc.setTextColor(60);
                        doc.text(notesLines, marginX + 360, y + 10);
                        doc.setTextColor(0);
                        y += rowH;
                    });
                    y += 8;
                }

                // === COVER PAGE ===
                doc.setFont('helvetica', 'bold');
                doc.setFontSize(22);
                doc.text('4M FIRE INC.', pageW / 2, 150, { align: 'center' });
                doc.setFontSize(14);
                doc.setFont('helvetica', 'normal');
                doc.text('Sprinkler System Inspection Report', pageW / 2, 175, { align: 'center' });

                doc.setDrawColor(0);
                doc.setLineWidth(1);
                doc.line(marginX + 80, 195, pageW - marginX - 80, 195);

                doc.setFontSize(16);
                doc.setFont('helvetica', 'bold');
                doc.text(freqLabel.toUpperCase(), pageW / 2, 230, { align: 'center' });

                doc.setFontSize(18);
                doc.text(s(d.screen2.companyName) || 'Client', pageW / 2, 280, { align: 'center' });
                doc.setFontSize(12);
                doc.setFont('helvetica', 'normal');
                const addrLines = doc.splitTextToSize(s(d.screen2.buildingAddress) || '', pageW - 2 * marginX - 80);
                doc.text(addrLines, pageW / 2, 305, { align: 'center' });

                y = 400;
                doc.setFontSize(11);
                doc.setFont('helvetica', 'bold');
                doc.text('Inspection Date:', marginX + 100, y);
                doc.setFont('helvetica', 'normal');
                doc.text(s(d.screen1.inspectionDate) || '—', marginX + 250, y);
                y += 20;
                doc.setFont('helvetica', 'bold');
                doc.text('Inspector:', marginX + 100, y);
                doc.setFont('helvetica', 'normal');
                doc.text(s(d.screen1.inspectorName) || '—', marginX + 250, y);
                y += 20;
                doc.setFont('helvetica', 'bold');
                doc.text('Certification #:', marginX + 100, y);
                doc.setFont('helvetica', 'normal');
                doc.text(s(d.screen1.skillCert) || '—', marginX + 250, y);

                addFooter();

                // === EXECUTIVE SUMMARY ===
                doc.addPage();
                y = marginTop;
                sectionTitle('EXECUTIVE SUMMARY');
                para(d.screen1.executiveSummary || 'No executive summary provided.');

                // === BUILDING INFORMATION ===
                sectionTitle('BUILDING INFORMATION');
                labelValueRow('Company Name', d.screen2.companyName);
                labelValueRow('Building Address', d.screen2.buildingAddress);
                labelValueRow('Contact Info', d.screen2.contactInfo);
                labelValueRow('Lock Box Code', d.screen2.lockBoxCode);
                labelValueRow('Fire Panel Monitoring Company', d.screen2.firePanelCompany);
                labelValueRow('Fire Panel Account #', d.screen2.firePanelAccount);
                labelValueRow('Fire Panel Password', d.screen2.firePanelPassword);
                y += 10;

                // === ASSET SUMMARY ===
                sectionTitle('ASSET SUMMARY');
                labelValueRow('Dry Systems', d.screen3.drySystems);
                labelValueRow('Wet Systems', d.screen3.wetSystems);
                labelValueRow('Fire Pumps', d.screen3.firePumps);
                labelValueRow('Fire Hydrants', d.screen3.fireHydrants);
                labelValueRow('Standpipe', d.screen3.standpipe ? 'Yes' : 'No');
                y += 10;

                // === CHECKLISTS ===
                doc.addPage();
                y = marginTop;
                sectionTitle('INSPECTION CHECKLISTS');
                checklistSections.forEach(section => {
                    ensureSpace(40);
                    subTitle(section.name);
                    checklistTable(section);
                });

                // === ASSET TEST DETAILS ===
                const hasAny = (d.screen5.drySystems && d.screen5.drySystems.length) ||
                               (d.screen5.wetSystems && d.screen5.wetSystems.length) ||
                               (d.screen5.firePumps && d.screen5.firePumps.length) ||
                               (d.screen5.fireHydrants && d.screen5.fireHydrants.length) ||
                               (d.screen5.flowsTamperSwitch && d.screen5.flowsTamperSwitch.length) ||
                               d.screen5.standpipeFlow;

                if (hasAny) {
                    doc.addPage();
                    y = marginTop;
                    sectionTitle('ASSET TEST DETAILS');

                    function renderTestRows(title, arr, fields) {
                        if (!arr || !arr.length) return;
                        arr.forEach((item, idx) => {
                            ensureSpace(30);
                            subTitle(title + ' ' + (idx + 1));
                            fields.forEach(([lbl, key]) => {
                                if (item[key] !== undefined && item[key] !== '' && item[key] !== null) {
                                    labelValueRow(lbl, item[key]);
                                }
                            });
                            y += 8;
                        });
                    }

                    renderTestRows('Dry System', d.screen5.drySystems, [
                        ['System #', 'systemNo'], ['Location', 'location'], ['Valve Size', 'valveSize'],
                        ['Model #', 'modelNo'], ['Air Pressure', 'airPressure'], ['Static Pressure', 'staticPressure'],
                        ['Residual Pressure', 'residualPressure'], ['Trip Time', 'tripTime'],
                        ['Water Reach Time', 'waterReachTime'], ['Control Valve Type', 'controlValveType'],
                        ['Left In Service', 'leftInService'], ['Notes', 'notes']
                    ]);
                    renderTestRows('Wet System', d.screen5.wetSystems, [
                        ['Valve Size', 'valveSize'], ['Model #', 'modelNo'], ['Pressure', 'pressure'],
                        ['Static Pressure', 'staticPressure'], ['Residual Pressure', 'residualPressure'],
                        ['Control Valve Type', 'controlValveType'], ['Left In Service', 'leftInService'],
                        ['Notes', 'notes']
                    ]);
                    renderTestRows('Fire Pump', d.screen5.firePumps, [
                        ['Location', 'location'], ['Inlet/Outlet Size', 'inletOutletSize'],
                        ['Make/Model', 'makeModel'], ['Startup Pressure', 'startupPressure'],
                        ['Developed Pressure', 'developedPressure'], ['Notes', 'notes']
                    ]);
                    renderTestRows('Fire Hydrant', d.screen5.fireHydrants, [
                        ['Location', 'location'], ['Valve Size', 'valveSize'], ['Model #', 'modelNo'],
                        ['Static Pressure', 'staticPressure'], ['Colour', 'colour'], ['Notes', 'notes']
                    ]);

                    if (d.screen5.flowsTamperSwitch && d.screen5.flowsTamperSwitch.length) {
                        ensureSpace(30);
                        subTitle('Flows and Tamper Switch Inspections');
                        d.screen5.flowsTamperSwitch.forEach((row, idx) => {
                            labelValueRow('#' + (idx + 1) + ' Description', row.description);
                            labelValueRow('FS Operations', row.fsOperations);
                            labelValueRow('Time/PSI', row.timePsi);
                            labelValueRow('Location', row.location);
                        });
                    }

                    if (d.screen5.standpipeFlow) {
                        const sp = d.screen5.standpipeFlow;
                        ensureSpace(30);
                        subTitle('Standpipe Flow Test');
                        labelValueRow('Building Height', sp.buildingHeight);
                        labelValueRow('Highest Hose Station', sp.highestHoseStation);
                        labelValueRow('Flow Test Location', sp.flowTestLocation);
                        labelValueRow('Test 1 Static / Residual / Flow', (sp.test1_static||'—') + ' / ' + (sp.test1_residual||'—') + ' / ' + (sp.test1_flow||'—'));
                        labelValueRow('Test 2 Static / Residual / Flow', (sp.test2_static||'—') + ' / ' + (sp.test2_residual||'—') + ' / ' + (sp.test2_flow||'—'));
                        labelValueRow('Test 3 Static / Residual / Flow', (sp.test3_static||'—') + ' / ' + (sp.test3_residual||'—') + ' / ' + (sp.test3_flow||'—'));
                    }
                }

                // === DEFICIENCIES & RECOMMENDATIONS ===
                doc.addPage();
                y = marginTop;
                sectionTitle('DEFICIENCIES');
                para(d.screen6.deficiencies || 'None noted.');
                y += 10;
                sectionTitle('RECOMMENDATIONS');
                para(d.screen6.recommendations || 'None noted.');

                // Footer on all pages
                const totalPages = doc.internal.getNumberOfPages();
                for (let i = 1; i <= totalPages; i++) {
                    doc.setPage(i);
                    doc.setFont('helvetica', 'normal');
                    doc.setFontSize(8);
                    doc.setTextColor(120);
                    doc.text('4M Fire Inc. — ' + (d.screen2.companyName || '') + ' — ' + (d.screen1.inspectionDate || ''), marginX, pageH - 25);
                    doc.text('Page ' + i + ' of ' + totalPages, pageW - marginX, pageH - 25, { align: 'right' });
                }

                const filename = buildInspectionFilename(inspectionData, 'pdf');
                doc.save(filename);

                if (btn) { btn.textContent = originalText; btn.disabled = false; }
            } catch (err) {
                console.error('PDF generation error:', err);
                if (btn) { btn.textContent = originalText; btn.disabled = false; }
                alert('PDF generation failed: ' + err.message + '\n\nYou can use the Print button as an alternative — choose "Save as PDF" from the print dialog.');
            }
        }

        // Export all inspections as a JSON file (for transferring between devices)
        async function exportInspectionsJSON() {
            try {
                const inspections = await getAllInspections();
                if (inspections.length === 0) {
                    alert('No inspections to export.');
                    return;
                }
                const exportData = {
                    appVersion: '4M Fire Inspection',
                    exportedAt: new Date().toISOString(),
                    inspectionCount: inspections.length,
                    inspections: inspections
                };
                const json = JSON.stringify(exportData, null, 2);
                const blob = new Blob([json], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = '4M_Fire_Inspections_Backup_' + new Date().toISOString().split('T')[0] + '.json';
                a.click();
                URL.revokeObjectURL(url);
                alert('Exported ' + inspections.length + ' inspection(s). Transfer this file to your other device and use "Import Inspections" to load them.');
            } catch(e) {
                alert('Export error: ' + e.message);
            }
        }

        // Import inspections from a JSON backup file
        function importInspectionsJSON() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                try {
                    const text = await file.text();
                    const data = JSON.parse(text);
                    if (!data.inspections || !Array.isArray(data.inspections)) {
                        alert('Invalid backup file. Please select a valid 4M Fire Inspections export file.');
                        return;
                    }
                    const count = data.inspections.length;
                    if (!confirm('Import ' + count + ' inspection(s)? This will ADD them to your existing inspections (duplicates will not be merged).')) {
                        return;
                    }
                    let imported = 0;
                    for (const record of data.inspections) {
                        if (record.fullData) {
                            try {
                                await saveInspectionToDB(record.fullData);
                                imported++;
                            } catch(err) {
                                console.error('Failed to import record:', err);
                            }
                        }
                    }
                    alert('Successfully imported ' + imported + ' of ' + count + ' inspection(s).');
                    renderDashboard();
                } catch(err) {
                    alert('Error reading file: ' + err.message);
                }
            };
            input.click();
        }

        async function exportToExcel() {
            try {
                const inspections = await getAllInspections();
                if (inspections.length === 0) {
                    alert('No inspections to export.');
                    return;
                }

                // Build CSV
                const headers = [
                    'ID', 'Inspection Date', 'Inspector Name', 'Certification #', 'Inspection Type',
                    'Company Name', 'Building Address', 'Contact Info',
                    'Dry Systems', 'Wet Systems', 'Fire Pumps', 'Fire Hydrants', 'Standpipe',
                    'Deficiencies', 'Recommendations', 'Saved At'
                ];

                const escapeCSV = (val) => {
                    const str = String(val == null ? '' : val);
                    if (str.includes(',') || str.includes('"') || str.includes('\n')) {
                        return '"' + str.replace(/"/g, '""') + '"';
                    }
                    return str;
                };

                let csv = headers.map(escapeCSV).join(',') + '\n';
                inspections.forEach(r => {
                    csv += [
                        r.id,
                        r.inspectionDate || '',
                        r.inspectorName || '',
                        r.skillCert || '',
                        r.inspectionType || '',
                        r.companyName || '',
                        r.buildingAddress || '',
                        r.contactInfo || '',
                        r.drySystems || 0,
                        r.wetSystems || 0,
                        r.firePumps || 0,
                        r.fireHydrants || 0,
                        r.standpipe ? 'Yes' : 'No',
                        r.deficiencies || '',
                        r.recommendations || '',
                        r.savedAt || ''
                    ].map(escapeCSV).join(',') + '\n';
                });

                const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = '4M_Fire_Inspections_Export_' + new Date().toISOString().split('T')[0] + '.csv';
                a.click();
                URL.revokeObjectURL(url);
            } catch(e) {
                alert('Error exporting: ' + e.message);
            }
        }

        // Initialize
        document.getElementById('backBtn').addEventListener('click', previousScreen);
        document.getElementById('nextBtn').addEventListener('click', nextScreen);

        initializeProgressBar();
        renderScreen();

        // Register service worker for offline support
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js').then(reg => {
                console.log('Service worker registered:', reg.scope);
            }).catch(err => {
                console.log('Service worker registration failed:', err);
            });
        }
    </script>
